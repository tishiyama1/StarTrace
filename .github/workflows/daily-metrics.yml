name: Daily metrics snapshot

# 毎日 0:00 JST に、利用状況・フィードバック・エラーを DynamoDB から集めて
# metrics/YYYY-MM-DD.json としてリポジトリ(main)にコミットする。
# ここでは Issue を作らない(データの記録に徹する)。
# 5:00 JST の改善提案 Routine(Claude)がこのファイルを入力として読み、
# 日次レポート Issue と改善 Issue を作成する。
# GitHub のスケジュールは混雑時に1〜2時間遅延しうるため、Routine(5:00 JST)まで
# 十分な余裕をとって早い時刻(0:00 JST)に寄せている。
on:
  schedule:
    - cron: '0 15 * * *' # 15:00 UTC = 00:00 JST
  workflow_dispatch:

# メトリクスのコミット同士がぶつからないように直列化する。
concurrency:
  group: metrics-snapshot
  cancel-in-progress: false

permissions:
  id-token: write # OIDC で AWS ロールを引き受ける
  contents: write # metrics/ をコミットして push する

env:
  AWS_REGION: ap-northeast-1
  STACK_NAME: startrace

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Collect metrics into metrics/<date>.json
        run: |
          set -euo pipefail

          TABLE="$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='DataTableName'].OutputValue" \
            --output text)"

          TODAY_JST="$(TZ=Asia/Tokyo date +%Y-%m-%d)"
          CUTOFF="$(TZ=UTC date -d '7 days ago' +%Y-%m-%d)"
          mkdir -p metrics

          # ---- 全体統計 --------------------------------------------------
          TOTALS="$(aws dynamodb get-item --table-name "$TABLE" --region "$AWS_REGION" \
            --key '{"pk":{"S":"STATS"},"sk":{"S":"TOTAL"}}' --output json)"
          USERS="$(echo "$TOTALS" | jq -r '.Item.users.N // "0"')"
          DISCOVERIES="$(echo "$TOTALS" | jq -r '.Item.discoveries.N // "0"')"

          # ---- 星座別 発見数(全件・降順) --------------------------------
          CONST_JSON="$(aws dynamodb query --table-name "$TABLE" --region "$AWS_REGION" \
            --key-condition-expression "pk = :p" \
            --expression-attribute-values '{":p":{"S":"CONST"}}' --output json \
            | jq '[.Items[] | {id: .sk.S, count: (.count.N|tonumber)}] | sort_by(-.count)')"

          # ---- 利用イベント(直近7日ぶんの日次カウンタ) -------------------
          EVENTS_JSON="$(aws dynamodb query --table-name "$TABLE" --region "$AWS_REGION" \
            --key-condition-expression "pk = :p" \
            --expression-attribute-values '{":p":{"S":"EVENT"}}' --output json \
            | jq --arg cutoff "$CUTOFF" \
              '[.Items[] | select(.sk.S >= $cutoff)
                | {date: (.sk.S|split("#")[0]), type: (.sk.S|split("#")[1]), count: (.count.N|tonumber)}]
               | sort_by(.date, .type) | reverse')"

          # ---- 未処理フィードバック --------------------------------------
          FEEDBACK_JSON="$(aws dynamodb query --table-name "$TABLE" --region "$AWS_REGION" \
            --key-condition-expression "pk = :p" \
            --filter-expression "issueCreated = :f" \
            --expression-attribute-values '{":p":{"S":"FEEDBACK"},":f":{"BOOL":false}}' \
            --output json \
            | jq '[.Items[] | {category: .category.S, message: .message.S, createdAt: .createdAt.S}]
                  | sort_by(.createdAt) | reverse | .[:20]')"

          # ---- 直近のエラー ----------------------------------------------
          ERRORS_JSON="$(aws dynamodb query --table-name "$TABLE" --region "$AWS_REGION" \
            --key-condition-expression "pk = :p" \
            --expression-attribute-values '{":p":{"S":"ERROR"}}' \
            --no-scan-index-forward --max-items 15 --output json \
            | jq '[.Items[] | {createdAt: .createdAt.S, message: .message.S, url: .url.S, ua: (.ua.S[:80])}]')"

          jq -n \
            --arg date "$TODAY_JST" \
            --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson users "$USERS" \
            --argjson discoveries "$DISCOVERIES" \
            --argjson constellations "$CONST_JSON" \
            --argjson events "$EVENTS_JSON" \
            --argjson feedback "$FEEDBACK_JSON" \
            --argjson errors "$ERRORS_JSON" \
            '{
              date: $date,
              generatedAt: $generatedAt,
              totals: { users: $users, discoveries: $discoveries },
              events7d: $events,
              constellations: $constellations,
              feedbackUnprocessed: $feedback,
              errorsRecent: $errors
            }' > "metrics/${TODAY_JST}.json"

          echo "wrote metrics/${TODAY_JST}.json"

      - name: Commit snapshot
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/
          if git diff --cached --quiet; then
            echo "no metrics change"
            exit 0
          fi
          git commit -m "chore(metrics): snapshot $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          # 競合時に備えてリベースしてから push(最大3回)
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
