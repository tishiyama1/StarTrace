name: CI

# PR に対して test / lint / build / backend構文チェック を実行する。
# 自律運用の承認者(Reviewer)が「CIが緑か」を客観的なマージ基準に使う。
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同一PRへの新しい push で古い実行を打ち切る。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Backend syntax check
        run: node --check backend/index.mjs
