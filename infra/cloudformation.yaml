AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  StarTrace static site hosting: private S3 bucket served through CloudFront
  using Origin Access Control (OAC), plus an IAM role for GitHub Actions
  deployments via OpenID Connect (OIDC). No custom domain (uses the default
  *.cloudfront.net certificate).

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: startrace
    Description: Prefix used for resource names (lowercase, DNS-safe).
    AllowedPattern: '^[a-z0-9][a-z0-9-]{1,30}[a-z0-9]$'
    ConstraintDescription: 3-32 chars, lowercase letters, digits and hyphens only.

  GitHubOwner:
    Type: String
    Default: tishiyama1
    Description: GitHub account/organization that owns the repository.

  GitHubRepo:
    Type: String
    Default: StarTrace
    Description: GitHub repository name (case-sensitive, as it appears on GitHub).

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch that is allowed to assume the deploy role.

  ExistingGitHubOIDCProviderArn:
    Type: String
    Default: ''
    Description: >-
      Leave empty to create the GitHub OIDC provider. If your account already
      has one (token.actions.githubusercontent.com can exist only once per
      account), paste its ARN here to reuse it.

  CloudFrontPriceClass:
    Type: String
    Default: PriceClass_200
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
    Description: >-
      CloudFront edge coverage. PriceClass_200 covers Asia (incl. Tokyo) at a
      lower cost than All. PriceClass_100 excludes Asia/South America.

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  CreateOIDCProvider: !Equals [!Ref ExistingGitHubOIDCProviderArn, '']

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:
  # --- S3 bucket (private; only CloudFront can read it) --------------------
  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-site-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-noncurrent-versions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
          - Id: abort-incomplete-multipart-uploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # --- Origin Access Control (modern replacement for OAI) ------------------
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-oac'
        Description: OAC so only this CloudFront distribution can read the bucket.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- CloudFront distribution --------------------------------------------
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub '${ProjectName} static site'
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: !Ref CloudFrontPriceClass
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              # Must be empty when using OAC.
              OriginAccessIdentity: ''
          - Id: ApiOrigin
            DomainName: !Sub '${DataApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        # /api/* is served by the HTTP API (dynamic, never cached). Everything
        # else is served from S3. Same-origin means the frontend just calls
        # "/api/..." with no CORS and no build-time API URL.
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            Compress: true
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            # AWS managed policies: CachingDisabled + AllViewerExceptHostHeader
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          # AWS managed policies:
          #  CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          #  SecurityHeadersPolicy (HSTS, X-Content-Type-Options, etc.)
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
        # SPA / deep-link fallback. A private bucket behind OAC returns 403 for
        # missing keys, so map both 403 and 404 back to index.html with 200.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # --- Bucket policy: allow only this distribution (via OAC) ---------------
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}'
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt SiteBucket.Arn
              - !Sub '${SiteBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # --- GitHub OIDC provider (optional) ------------------------------------
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # GitHub's certificate thumbprint. AWS validates the provider against its
      # own trust store, so this value is effectively a placeholder that AWS
      # keeps up to date; the well-known value is kept here for compatibility.
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  # --- IAM role assumed by GitHub Actions to deploy ------------------------
  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-github-deploy'
      Description: Assumed by GitHub Actions (OIDC) to deploy the static site.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref ExistingGitHubOIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                # Only the configured branch of this repo may assume the role.
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOwner}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}'
      Policies:
        - PolicyName: deploy-static-site
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadStackOutputs
                Effect: Allow
                Action: cloudformation:DescribeStacks
                Resource: !Ref AWS::StackId
              - Sid: ListBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt SiteBucket.Arn
              - Sid: WriteObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub '${SiteBucket.Arn}/*'
              - Sid: InvalidateCloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                Resource: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}'
              - Sid: UpdateBackendLambda
                Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:GetFunction
                Resource: !GetAtt ApiFunction.Arn
              - Sid: ReadWriteFeedbackForIssueSync
                Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource: !GetAtt DataTable.Arn

  # --- DynamoDB: aggregate counters + feedback ----------------------------
  DataTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-data'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        # error samples auto-expire after 30 days (expiresAt, epoch seconds)
        AttributeName: expiresAt
        Enabled: true

  # --- Lambda execution role ----------------------------------------------
  ApiFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-api-fn'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs-and-dynamodb
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-api:*'
              - Sid: DynamoDbAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource: !GetAtt DataTable.Arn

  # --- Lambda function -----------------------------------------------------
  # Created with a placeholder body; the real code in backend/ is pushed by the
  # deploy pipeline via `aws lambda update-function-code`.
  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-api'
      Runtime: nodejs22.x
      Handler: index.handler
      Timeout: 10
      MemorySize: 256
      Role: !GetAtt ApiFunctionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
      Code:
        ZipFile: |
          export const handler = async () => ({
            statusCode: 503,
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ error: 'backend not deployed yet' }),
          });

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-api'
      RetentionInDays: 30

  # --- HTTP API (API Gateway v2) ------------------------------------------
  DataApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-api'
      ProtocolType: HTTP

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref DataApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: '2.0'

  RouteStats:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DataApi
      RouteKey: 'GET /api/stats'
      Target: !Sub 'integrations/${ApiIntegration}'

  RouteVisit:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DataApi
      RouteKey: 'POST /api/visit'
      Target: !Sub 'integrations/${ApiIntegration}'

  RouteDiscovery:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DataApi
      RouteKey: 'POST /api/discovery'
      Target: !Sub 'integrations/${ApiIntegration}'

  RouteFeedback:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DataApi
      RouteKey: 'POST /api/feedback'
      Target: !Sub 'integrations/${ApiIntegration}'

  RouteEvent:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DataApi
      RouteKey: 'POST /api/event'
      Target: !Sub 'integrations/${ApiIntegration}'

  RouteError:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DataApi
      RouteKey: 'POST /api/error'
      Target: !Sub 'integrations/${ApiIntegration}'

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref DataApi
      StageName: $default
      AutoDeploy: true
      DefaultRouteSettings:
        # Basic throttling to blunt abuse of the public endpoints.
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${DataApi}/*/*'

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  BucketName:
    Description: S3 bucket that holds the built site.
    Value: !Ref SiteBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  DistributionId:
    Description: CloudFront distribution ID (used for cache invalidation).
    Value: !Ref Distribution
    Export:
      Name: !Sub '${AWS::StackName}-DistributionId'

  DistributionDomainName:
    Description: Public URL host for the site.
    Value: !GetAtt Distribution.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-DistributionDomainName'

  SiteURL:
    Description: Open this in a browser once content is deployed.
    Value: !Sub 'https://${Distribution.DomainName}'

  GitHubDeployRoleArn:
    Description: Set this as the AWS_DEPLOY_ROLE_ARN GitHub Actions variable.
    Value: !GetAtt GitHubDeployRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-GitHubDeployRoleArn'

  ApiFunctionName:
    Description: Backend Lambda function name (deploy pipeline pushes code here).
    Value: !Ref ApiFunction
    Export:
      Name: !Sub '${AWS::StackName}-ApiFunctionName'

  DataTableName:
    Description: DynamoDB table holding stats and feedback.
    Value: !Ref DataTable
    Export:
      Name: !Sub '${AWS::StackName}-DataTableName'

  ApiEndpoint:
    Description: Direct HTTP API endpoint (normally accessed via CloudFront /api/*).
    Value: !GetAtt DataApi.ApiEndpoint
